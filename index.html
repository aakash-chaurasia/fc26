<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA 2026: Official Leaderboard</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --accent: #00d4ff; --gold: #ffc107; --bg: #0d0d0d; --card: #1a1a1a; --danger: #ff4444; --silver: #c0c0c0; --bronze: #cd7f32; --text: #e0e0e0; --bye: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        
        /* SYNC OVERLAY */
        #syncOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 13, 13, 0.98); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.5s;
        }
        .hourglass { font-size: 4rem; animation: flip 2s infinite; margin-bottom: 20px; }
        @keyframes flip { 0% { transform: rotate(0); } 50% { transform: rotate(180deg); } 100% { transform: rotate(180deg); } }
        .sync-text { color: var(--gold); font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }

        /* NAVIGATION */
        nav { background: #111; display: flex; border-bottom: 2px solid #333; position: sticky; top: 0; z-index: 1000; }
        .tab-btn { flex: 1; padding: 18px; border: none; background: transparent; color: #666; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(0, 212, 255, 0.05); }
        
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        /* ROSTER STYLES */
        .roster-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; max-width: 1200px; margin: auto; }
        .team-row { background: #222; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--accent); transition: 0.3s; }
        .dot { width: 16px; height: 16px; border-radius: 50%; border: 2px solid #444; display: inline-block; }
        .dot.used { background: var(--danger); border-color: var(--danger); }
        .team-row.maxed { background: #181818; border-left-color: #444; opacity: 0.4; filter: grayscale(1); }
        .team-row.maxed .team-name { text-decoration: line-through; color: #888; }

        /* LEADERBOARD TABLE */
        .jumbo-container { max-width: 1100px; margin: auto; background: #000; border: 4px solid #333; border-radius: 20px; overflow: hidden; }
        .jumbo-header { background: linear-gradient(90deg, #111, #222); padding: 20px; text-align: center; border-bottom: 2px solid #333; }
        .jumbo-header h1 { margin: 0; color: var(--gold); text-transform: uppercase; letter-spacing: 5px; font-size: 2em; }
        
        table { width: 100%; border-collapse: collapse; font-size: 1.2em; }
        th { background: #111; color: #666; padding: 15px; text-transform: uppercase; font-size: 0.7em; text-align: left; }
        td { padding: 18px 15px; border-bottom: 1px solid #222; }
        
        /* BADGES */
        .badge { font-size: 0.6em; padding: 4px 8px; border-radius: 4px; font-weight: bold; margin-left: 10px; vertical-align: middle; }
        .badge-bye { background: var(--bye); color: white; }
        .badge-playoffs { background: var(--accent); color: black; }

        .rank-col { width: 50px; text-align: center; font-weight: 900; }
        .pts-col { font-weight: 900; color: var(--accent); text-align: center; }
        .stat-col { text-align: center; color: #888; width: 60px; }
        
        tr.qualifier-top { background: rgba(40, 167, 69, 0.05); }
        tr.qualifier-mid { background: rgba(0, 212, 255, 0.03); }
    </style>
</head>
<body>

    <div id="syncOverlay">
        <div class="hourglass">⏳</div>
        <div class="sync-text">Syncing Live Standings...</div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'jumbo-tab')">📊 Leaderboard</button>
        <button class="tab-btn" onclick="switchTab(event, 'roster-tab')">📋 My Roster Tracker</button>
    </nav>

    <div id="jumbo-tab" class="tab-content active">
        <div class="jumbo-container">
            <div class="jumbo-header"><h1>Standings</h1></div>
            <table>
                <thead>
                    <tr>
                        <th class="rank-col">#</th>
                        <th>Player</th>
                        <th class="stat-col">W</th>
                        <th class="stat-col">D</th>
                        <th class="stat-col">L</th>
                        <th class="stat-col">GD</th>
                        <th class="pts-col">PTS</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody"></tbody>
            </table>
            <div style="padding:15px; font-size:0.7em; text-align:center; color:#555;">
                <span style="color:var(--bye)">■</span> Top 2: BYE to Semi-Finals | <span style="color:var(--accent)">■</span> 3rd-6th: Quarter-Finals
            </div>
        </div>
        <div style="text-align:center; margin-top:20px;">
            <button onclick="syncAllData()" style="background:transparent; color:#444; border:1px solid #333; padding:8px 16px; border-radius:5px; cursor:pointer;">🔄 LIVE REFRESH</button>
        </div>
    </div>

    <div id="roster-tab" class="tab-content">
        <div style="text-align:center; margin-bottom:20px;">
            <select id="playerSel" onchange="renderRoster()" style="padding:12px; width:300px; background:#222; color:var(--gold); border-radius:8px; border:1px solid #444;">
                <option value="">-- SELECT YOUR NAME --</option>
            </select>
        </div>
        <div id="rosterList" class="roster-grid"></div>
    </div>

<script>
    // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw3WWHbE85uSIHnlYuxM_5VlK4KIzebZn2qwLH-Vu53Ic81QZbxpjMHuM9TV_RwQMuW/exec";
    const PROXY = "https://corsproxy.io/?";
    let globalData = null;

    window.onload = function() { syncAllData(); };

    function switchTab(evt, name) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    async function syncAllData() {
        const overlay = document.getElementById('syncOverlay');
        overlay.style.display = 'flex';
        overlay.style.opacity = '1';

        try {
            const resp = await fetch(PROXY + encodeURIComponent(SCRIPT_URL + "?t=" + Date.now()));
            globalData = await resp.json();
            
            const sel = document.getElementById('playerSel');
            const currentVal = sel.value;
            sel.innerHTML = '<option value="">-- SELECT YOUR NAME --</option>';
            if (globalData.players) {
                globalData.players.forEach(p => { if(p.name) sel.innerHTML += `<option value="${p.name}">${p.name}</option>`; });
            }
            sel.value = currentVal;
            if(currentVal) renderRoster();

            renderLeaderboard();
            
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 500);
        } catch (e) {
            document.querySelector('.sync-text').innerText = "❌ Sync Error. Check URL.";
        }
    }

    function renderLeaderboard() {
        let stats = {};
        if (globalData.players) { globalData.players.forEach(p => stats[p.name] = { wins: 0, draws: 0, losses: 0, gd: 0, pts: 0 }); }

        (globalData.scores || []).slice(1).forEach(row => {
            const p1 = row[1], p2 = row[2], s1 = parseInt(row[5]), s2 = parseInt(row[6]);
            if(p1 && p2 && !isNaN(s1) && !isNaN(s2) && stats[p1]) {
                stats[p1].gd += (s1 - s2); stats[p2].gd += (s2 - s1);
                if(s1 > s2) { stats[p1].wins++; stats[p1].pts += 3; stats[p2].losses++; }
                else if(s2 > s1) { stats[p2].wins++; stats[p2].pts += 3; stats[p1].losses++; }
                else { stats[p1].draws++; stats[p1].pts += 1; stats[p2].draws++; stats[p2].pts += 1; }
            }
        });

        const sorted = Object.keys(stats).map(n => ({ name: n, ...stats[n] }))
                            .sort((a,b) => b.pts - a.pts || b.gd - a.gd || b.wins - a.wins);

        const body = document.getElementById('leaderboardBody');
        body.innerHTML = "";
        sorted.forEach((p, i) => {
            let rowClass = "";
            let badge = "";
            
            if (i < 2) { 
                rowClass = "qualifier-top"; 
                badge = '<span class="badge badge-bye">BYE</span>'; 
            } else if (i < 6) { 
                rowClass = "qualifier-mid"; 
                badge = '<span class="badge badge-playoffs">PLAYOFFS</span>'; 
            }

            body.innerHTML += `
                <tr class="${rowClass}">
                    <td class="rank-col" style="color:${i<2?'var(--gold)':'#444'}">${i + 1}</td>
                    <td class="name-col">${p.name} ${badge}</td>
                    <td class="stat-col">${p.wins}</td>
                    <td class="stat-col">${p.draws}</td>
                    <td class="stat-col">${p.losses}</td>
                    <td class="stat-col">${p.gd > 0 ? '+' + p.gd : p.gd}</td>
                    <td class="pts-col">${p.pts}</td>
                </tr>
            `;
        });
    }

    function renderRoster() {
        const name = document.getElementById('playerSel').value;
        const list = document.getElementById('rosterList'); list.innerHTML = "";
        const player = globalData.players.find(p => p.name === name);
        if(!player) return;

        player.teams.forEach(team => {
            if(!team) return;
            const used = (globalData.usageMap && globalData.usageMap[name] && globalData.usageMap[name][team]) || 0;
            const isMaxed = used >= 1;

            list.innerHTML += `
                <div class="team-row ${isMaxed ? 'maxed' : ''}">
                    <div><span style="font-weight:bold">${team}</span><br><div class="dot ${isMaxed ? 'used' : ''}"></div></div>
                    <div style="font-size:0.75em; font-weight:bold; color:${isMaxed?'var(--danger)':'#666'}">${isMaxed?'MAXED':'READY'}</div>
                </div>`;
        });
    }
</script>
</body>
</html>
