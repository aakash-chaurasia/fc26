<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FIFA 2026: Group Stage Leaderboard</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --accent: #00d4ff; --gold: #ffc107; --bg: #0d0d0d; --card: #1a1a1a; --danger: #ff4444; --silver: #c0c0c0; --text: #e0e0e0; --bye: #28a745; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; overflow-x: hidden; }
        
        /* SYNC OVERLAY */
        #syncOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(13, 13, 13, 0.98); z-index: 2000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: 0.5s;
        }
        .hourglass { font-size: 4rem; animation: flip 2s infinite; margin-bottom: 20px; }
        @keyframes flip { 0% { transform: rotate(0); } 50% { transform: rotate(180deg); } 100% { transform: rotate(180deg); } }
        .sync-text { color: var(--gold); font-weight: bold; letter-spacing: 2px; text-transform: uppercase; }

        /* NAVIGATION */
        nav { background: #111; display: flex; border-bottom: 2px solid #333; position: sticky; top: 0; z-index: 1000; }
        .tab-btn { flex: 1; padding: 18px; border: none; background: transparent; color: #666; font-weight: bold; cursor: pointer; text-transform: uppercase; transition: 0.3s; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); background: rgba(0, 212, 255, 0.05); }
        
        .tab-content { display: none; padding: 20px; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; } }

        /* LEADERBOARD TABLE */
        .group-container { max-width: 1000px; margin: 0 auto 40px auto; background: #000; border: 2px solid #333; border-radius: 15px; overflow: hidden; }
        .group-header { background: #111; padding: 15px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .group-header h2 { margin: 0; font-size: 1.2em; color: var(--accent); text-transform: uppercase; }
        
        table { width: 100%; border-collapse: collapse; }
        th { background: #0a0a0a; color: #555; padding: 12px; font-size: 0.7em; text-transform: uppercase; text-align: left; }
        td { padding: 15px 12px; border-bottom: 1px solid #1a1a1a; }
        
        .rank-col { width: 40px; text-align: center; font-weight: bold; }
        .pts-col { font-weight: 900; color: var(--gold); text-align: center; background: rgba(255, 193, 7, 0.02); }
        .stat-col { text-align: center; color: #777; width: 50px; font-size: 0.9em; }
        
        .badge { font-size: 0.6em; padding: 3px 6px; border-radius: 3px; font-weight: bold; margin-left: 8px; }
        .badge-bye { background: var(--bye); color: white; }
        .badge-playoff { background: var(--accent); color: black; }

        /* MATCH SCORES */
        .matches-section { max-width: 1000px; margin: 40px auto; }
        .matches-section h2 { color: var(--gold); text-transform: uppercase; font-size: 1em; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 15px; }
        .round-label { color: var(--accent); font-weight: bold; font-size: 0.75em; text-transform: uppercase; margin: 20px 0 8px; }
        .match-result { display: flex; align-items: center; background: #111; border: 1px solid #222; border-radius: 8px; padding: 12px 16px; margin-bottom: 6px; gap: 10px; }
        .match-result .p-name { flex: 1; font-weight: bold; font-size: 0.85em; }
        .match-result .p-name.left { text-align: right; }
        .match-result .p-name.right { text-align: left; }
        .match-result .score-box { background: #000; border: 1px solid #333; border-radius: 6px; padding: 6px 14px; font-weight: 900; font-size: 1.1em; color: var(--gold); min-width: 60px; text-align: center; }
        .match-result .team-label { font-size: 0.65em; color: #555; }
        .match-result .console-tag { font-size: 0.55em; padding: 2px 5px; border-radius: 3px; font-weight: bold; }
        .console-ps { background: #003791; color: white; }
        .console-xbox { background: #107c10; color: white; }
        .no-matches { color: #444; text-align: center; padding: 30px; font-style: italic; }

        /* ROSTER TRACKER */
        .roster-container { max-width: 1000px; margin: auto; }
        .roster-section { margin-bottom: 30px; }
        .roster-section h3 { color: var(--accent); text-transform: uppercase; font-size: 0.85em; border-bottom: 1px solid #333; padding-bottom: 8px; margin-bottom: 12px; }
        .roster-section h3 .count { color: #555; font-weight: normal; font-size: 0.9em; }
        .roster-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 12px; }
        .team-row { background: #1a1a1a; padding: 15px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 5px solid var(--accent); }
        .team-row.maxed { opacity: 0.3; filter: grayscale(1); border-left-color: #444; }
        .team-row.maxed span { text-decoration: line-through; }
        .dot { width: 14px; height: 14px; border-radius: 50%; border: 2px solid #444; }
        .dot.used { background: var(--danger); border-color: var(--danger); }
        .player-match { display: flex; align-items: center; background: #111; border: 1px solid #222; border-radius: 8px; padding: 12px 16px; margin-bottom: 6px; gap: 10px; }
        .player-match .opp-name { flex: 1; font-weight: bold; font-size: 0.85em; }
        .player-match .match-score { background: #000; border: 1px solid #333; border-radius: 6px; padding: 5px 12px; font-weight: 900; font-size: 1em; min-width: 55px; text-align: center; }
        .player-match .match-score.win { color: var(--bye); }
        .player-match .match-score.loss { color: var(--danger); }
        .player-match .match-score.draw { color: var(--gold); }
        .player-match .match-meta { font-size: 0.65em; color: #555; }
        .remaining-match { display: flex; align-items: center; background: #0a0a0a; border: 1px dashed #333; border-radius: 8px; padding: 12px 16px; margin-bottom: 6px; gap: 10px; }
        .remaining-match .opp-name { flex: 1; font-weight: bold; font-size: 0.85em; color: #666; }
        .remaining-match .pending-tag { font-size: 0.7em; color: #444; font-weight: bold; text-transform: uppercase; }

        /* PLAYOFFS BRACKET */
        .bracket-container { max-width: 1300px; margin: auto; padding: 20px 0; }
        .bracket-title { text-align: center; color: var(--gold); font-size: 1.3em; font-weight: 900; text-transform: uppercase; margin-bottom: 30px; }
        .bracket-grid {
            display: grid;
            grid-template-columns: 1fr 40px 1fr 40px 1fr 40px 1fr 40px 1fr;
            grid-template-rows: 1fr 30px 1fr;
            align-items: center;
            min-height: 500px;
        }
        .b-card { background: #111; border: 2px solid #333; border-radius: 10px; padding: 12px; width: 100%; box-sizing: border-box; }
        .b-card.decided { border-color: var(--bye); }
        .b-card.tbd { border-style: dashed; opacity: 0.4; }
        .b-card.final-card { border-color: var(--gold); background: #1a1400; }
        .b-card.final-card.decided { border-color: var(--bye); background: #0a1a0a; }
        .b-label { font-size: 0.65em; color: var(--accent); font-weight: 900; text-transform: uppercase; margin-bottom: 6px; display: flex; justify-content: space-between; align-items: center; }
        .b-label .b-home { font-size: 0.85em; background: var(--gold); color: black; padding: 1px 5px; border-radius: 3px; }
        .b-label .b-series { color: var(--gold); font-size: 1.2em; }
        .b-players { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
        .b-p { text-align: center; flex: 1; }
        .b-p .b-name { font-weight: 900; font-size: 0.8em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .b-p .b-seed { font-size: 0.55em; color: #555; }
        .b-p.winner .b-name { color: var(--bye); }
        .b-p.loser .b-name { color: #555; text-decoration: line-through; }
        .b-vs { color: #444; font-weight: 900; font-size: 0.75em; padding: 0 4px; }
        .b-games { display: flex; gap: 4px; justify-content: center; margin-top: 6px; }
        .b-g { background: #000; border: 1px solid #222; border-radius: 4px; padding: 3px 8px; text-align: center; font-size: 0.7em; min-width: 44px; }
        .b-g .b-gl { font-size: 0.7em; color: #444; }
        .b-g .b-gs { font-weight: 900; color: #555; }
        .b-g .b-gs.played { color: var(--gold); }
        .b-g.home { border-color: rgba(255,193,7,0.3); }
        .b-winner { text-align: center; font-size: 0.7em; color: var(--bye); font-weight: bold; margin-top: 6px; }
        /* Connector lines */
        .conn { position: relative; height: 100%; }
        .conn-r { border-top: 2px solid #333; border-right: 2px solid #333; border-bottom: 2px solid #333; border-radius: 0 8px 8px 0; height: 100%; min-height: 60px; }
        .conn-l { border-top: 2px solid #333; border-left: 2px solid #333; border-bottom: 2px solid #333; border-radius: 8px 0 0 8px; height: 100%; min-height: 60px; }
        .conn-h { border-top: 2px solid #333; height: 0; align-self: center; }
        .conn-r.active, .conn-l.active, .conn-h.active { border-color: var(--bye); }
        /* Grid placement */
        .g-qf1 { grid-column: 1; grid-row: 1; }
        .g-bye-b1 { grid-column: 1; grid-row: 3; }
        .g-conn-l1 { grid-column: 2; grid-row: 1 / 4; }
        .g-sf2 { grid-column: 3; grid-row: 1 / 4; align-self: center; }
        .g-conn-l2 { grid-column: 4; grid-row: 1 / 4; }
        .g-final { grid-column: 5; grid-row: 1 / 4; align-self: center; }
        .g-conn-r2 { grid-column: 6; grid-row: 1 / 4; }
        .g-sf1 { grid-column: 7; grid-row: 1 / 4; align-self: center; }
        .g-conn-r1 { grid-column: 8; grid-row: 1 / 4; }
        .g-qf2 { grid-column: 9; grid-row: 1; }
        .g-bye-a1 { grid-column: 9; grid-row: 3; }

        /* TROPHY CEREMONY */
        #trophyCeremony {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 3000;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; animation: fadeIn 1s ease;
        }
        #trophyCeremony.show { display: flex; }
        .trophy-icon { font-size: 6rem; animation: trophyBounce 1.5s ease infinite; margin-bottom: 10px; }
        @keyframes trophyBounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }
        }
        .trophy-title { font-size: 1em; color: #555; text-transform: uppercase; letter-spacing: 6px; margin-bottom: 10px; }
        .trophy-winner { font-size: 3em; font-weight: 900; color: var(--gold); text-shadow: 0 0 40px rgba(255,193,7,0.5); margin-bottom: 5px; animation: glowPulse 2s ease infinite; }
        @keyframes glowPulse {
            0%, 100% { text-shadow: 0 0 40px rgba(255,193,7,0.5); }
            50% { text-shadow: 0 0 80px rgba(255,193,7,0.8), 0 0 120px rgba(255,193,7,0.3); }
        }
        .trophy-subtitle { font-size: 1.4em; color: var(--accent); font-weight: bold; text-transform: uppercase; letter-spacing: 4px; margin-bottom: 30px; }
        .trophy-stats { display: flex; gap: 30px; margin-bottom: 30px; }
        .trophy-stat { text-align: center; }
        .trophy-stat-val { font-size: 2em; font-weight: 900; color: white; }
        .trophy-stat-label { font-size: 0.7em; color: #555; text-transform: uppercase; }
        .trophy-runner { color: var(--silver); font-size: 0.9em; margin-bottom: 30px; }
        .trophy-close { background: transparent; border: 1px solid #444; color: #666; padding: 12px 30px; border-radius: 8px; cursor: pointer; font-size: 0.85em; transition: 0.3s; }
        .trophy-close:hover { border-color: var(--gold); color: var(--gold); }
    </style>
</head>
<body>

    <div id="syncOverlay">
        <div class="hourglass">⏳</div>
        <div class="sync-text">Loading Group Standings...</div>
    </div>

    <nav>
        <button class="tab-btn active" onclick="switchTab(event, 'leaderboard-tab')">📊 Leaderboard</button>
        <button class="tab-btn" onclick="switchTab(event, 'roster-tab')">📋 Roster Tracker</button>
        <button class="tab-btn" onclick="switchTab(event, 'playoffs-tab')">🏆 Playoffs</button>
    </nav>

    <div id="leaderboard-tab" class="tab-content active">
        
        <div class="group-container">
            <div class="group-header"><h2>Group A</h2> <span style="font-size:0.7em; color:#555">Top 3 Advance</span></div>
            <table>
                <thead>
                    <tr><th class="rank-col">#</th><th>Player</th><th class="stat-col">P</th><th class="stat-col">W</th><th class="stat-col">D</th><th class="stat-col">L</th><th class="stat-col">GD</th><th class="pts-col">PTS</th></tr>
                </thead>
                <tbody id="body-A"></tbody>
            </table>
        </div>

        <div class="group-container">
            <div class="group-header"><h2>Group B</h2> <span style="font-size:0.7em; color:#555">Top 3 Advance</span></div>
            <table>
                <thead>
                    <tr><th class="rank-col">#</th><th>Player</th><th class="stat-col">P</th><th class="stat-col">W</th><th class="stat-col">D</th><th class="stat-col">L</th><th class="stat-col">GD</th><th class="pts-col">PTS</th></tr>
                </thead>
                <tbody id="body-B"></tbody>
            </table>
        </div>

        <div class="matches-section"><h2>⚽ Match Results</h2><div id="matchResults"></div></div>

        <div style="text-align:center;">
            <button onclick="syncAllData()" style="background:transparent; color:#444; border:1px solid #333; padding:10px 20px; border-radius:5px; cursor:pointer;">🔄 REFRESH SCORES</button>
        </div>
    </div>

    <div id="roster-tab" class="tab-content">
        <div style="text-align:center; margin-bottom:20px;">
            <select id="playerSel" onchange="renderRoster()" style="padding:12px; width:300px; background:#222; color:var(--gold); border-radius:8px; border:1px solid #444;">
                <option value="">-- SELECT YOUR NAME --</option>
            </select>
            <div id="playerStats" style="margin-top:10px; font-size:0.8em; color:#555;"></div>
        </div>
        <div class="roster-container">
            <div class="roster-section"><h3>🏟️ Played Matches <span class="count" id="playedCount"></span></h3><div id="playedMatches"></div></div>
            <div class="roster-section"><h3>⏳ Remaining Matches <span class="count" id="remainingCount"></span></h3><div id="remainingMatches"></div></div>
            <div class="roster-section"><h3>👕 Team Roster <span class="count" id="rosterCount"></span></h3><div id="rosterList" class="roster-grid"></div></div>
        </div>
    </div>

    <div id="playoffs-tab" class="tab-content">
        <div class="bracket-container" id="playoffBracket"></div>
    </div>

    <div id="trophyCeremony">
        <div class="trophy-icon">🏆</div>
        <div class="trophy-title">FIFA 2026 Champion</div>
        <div class="trophy-winner" id="champName"></div>
        <div class="trophy-subtitle">👑 Tournament Winner</div>
        <div class="trophy-stats">
            <div class="trophy-stat"><div class="trophy-stat-val" id="champW">0</div><div class="trophy-stat-label">Series Won</div></div>
            <div class="trophy-stat"><div class="trophy-stat-val" id="champG">0</div><div class="trophy-stat-label">Games Won</div></div>
        </div>
        <div class="trophy-runner" id="champRunner"></div>
        <button class="trophy-close" onclick="closeCeremony()">✖ CLOSE</button>
    </div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwyen0V-2kr4VfnIejaz2p6r6N0RX5k3ps1F_Wxc_65TVEml6HTcmLE1KHcddmwieoI/exec";
    const PROXY = "https://corsproxy.io/?";

    let globalData = null;
    let autoRefreshTimer = null;
    let ceremonyShown = false;

    window.onload = function() {
        syncAllData();
        autoRefreshTimer = setInterval(() => syncAllData(true), 30000);
    };

    function switchTab(evt, name) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(name).classList.add('active');
        evt.currentTarget.classList.add('active');
    }

    async function syncAllData(silent) {
        const overlay = document.getElementById('syncOverlay');
        if (!silent) {
            overlay.style.display = 'flex';
            overlay.style.opacity = '1';
        }

        try {
            const resp = await fetch(PROXY + encodeURIComponent(SCRIPT_URL + "?t=" + Date.now()));
            globalData = await resp.json();
            
            const sel = document.getElementById('playerSel');
            sel.innerHTML = '<option value="">-- SELECT YOUR NAME --</option>';
            globalData.players.forEach(p => { if(p.name) sel.innerHTML += `<option value="${p.name}">${p.name}</option>`; });

            renderLeaderboards();
            renderMatchResults();
            renderPlayoffs();
            // Re-render roster if a player is selected
            if (document.getElementById('playerSel').value) renderRoster();
            
            if (!silent) {
                overlay.style.opacity = '0';
                setTimeout(() => { overlay.style.display = 'none'; }, 500);
            }
        } catch (e) {
            if (!silent) document.querySelector('.sync-text').innerText = "❌ Sync Error.";
        }
    }

    function renderLeaderboards() {
        // Leaderboard sheet columns: 0=Rank, 1=Player, 2=Group, 3=P, 4=W, 5=D, 6=L, 7=GD, 8=Pts
        const lb = (globalData.leaderboard || []).slice(1);
        fillTable('body-A', lb.filter(r => r[2] === 'A'));
        fillTable('body-B', lb.filter(r => r[2] === 'B'));
    }

    function fillTable(id, rows) {
        const body = document.getElementById(id);
        body.innerHTML = "";
        rows.forEach((r, i) => {
            const badge = (i === 0) ? '<span class="badge badge-bye">BYE</span>'
                        : (i <= 2) ? '<span class="badge badge-playoff">PLAYOFF</span>' : '';
            const gd = r[7] > 0 ? '+' + r[7] : r[7];
            body.innerHTML += `
                <tr>
                    <td class="rank-col" style="color:${i < 3 ? 'var(--accent)' : '#444'}">${r[0]}</td>
                    <td>${r[1]} ${badge}</td>
                    <td class="stat-col">${r[3]}</td>
                    <td class="stat-col">${r[4]}</td>
                    <td class="stat-col">${r[5]}</td>
                    <td class="stat-col">${r[6]}</td>
                    <td class="stat-col">${gd}</td>
                    <td class="pts-col">${r[8]}</td>
                </tr>
            `;
        });
    }

    function renderMatchResults() {
        // Scores sheet columns: 0=MatchID, 1=Round, 2=Player1, 3=Player2, 4=P1Team, 5=P2Team, 6=P1Score, 7=P2Score, 8=Console, 9=Group
        const scores = (globalData.scores || []).slice(1).filter(r => r[0]);
        const container = document.getElementById('matchResults');

        if (!scores.length) {
            container.innerHTML = '<div class="no-matches">No matches played yet</div>';
            return;
        }

        // Group by round
        const rounds = {};
        scores.forEach(r => {
            const rd = r[1] || 'Unknown';
            if (!rounds[rd]) rounds[rd] = [];
            rounds[rd].push(r);
        });

        let html = '';
        Object.keys(rounds).sort().forEach(rd => {
            html += `<div class="round-label">🏟️ ${rd}</div>`;
            rounds[rd].forEach(r => {
                const consoleClass = (r[8] || '').toUpperCase().includes('XBOX') ? 'console-xbox' : 'console-ps';
                const winner = Number(r[6]) > Number(r[7]) ? 'left' : (Number(r[7]) > Number(r[6]) ? 'right' : '');
                html += `
                    <div class="match-result">
                        <div class="p-name left">${r[2]}<br><span class="team-label">${r[4]}</span></div>
                        <div class="score-box">${r[6]} - ${r[7]}</div>
                        <div class="p-name right">${r[3]}<br><span class="team-label">${r[5]}</span></div>
                        <span class="console-tag ${consoleClass}">${r[8]}</span>
                    </div>`;
            });
        });
        container.innerHTML = html;
    }

    function renderRoster() {
        const name = document.getElementById('playerSel').value;
        const list = document.getElementById('rosterList');
        const playedDiv = document.getElementById('playedMatches');
        const remainDiv = document.getElementById('remainingMatches');
        const statsDiv = document.getElementById('playerStats');
        list.innerHTML = ""; playedDiv.innerHTML = ""; remainDiv.innerHTML = ""; statsDiv.innerHTML = "";
        document.getElementById('playedCount').textContent = '';
        document.getElementById('remainingCount').textContent = '';
        document.getElementById('rosterCount').textContent = '';

        const player = globalData.players.find(p => p.name === name);
        if (!player || !name) return;

        // ─── PLAYED MATCHES ───
        const scores = (globalData.scores || []).slice(1).filter(r => r[0]);
        const played = scores.filter(r => r[2] === name || r[3] === name);
        const playedOpponents = new Set();

        if (played.length) {
            let wins = 0, draws = 0, losses = 0;
            played.forEach(r => {
                const isP1 = r[2] === name;
                const opp = isP1 ? r[3] : r[2];
                const myScore = Number(isP1 ? r[6] : r[7]);
                const oppScore = Number(isP1 ? r[7] : r[6]);
                const myTeam = isP1 ? r[4] : r[5];
                const oppTeam = isP1 ? r[5] : r[4];
                playedOpponents.add(opp);

                let resultClass = 'draw', resultLabel = 'D';
                if (myScore > oppScore) { resultClass = 'win'; resultLabel = 'W'; wins++; }
                else if (myScore < oppScore) { resultClass = 'loss'; resultLabel = 'L'; losses++; }
                else { draws++; }

                const consoleClass = (r[8] || '').toUpperCase().includes('XBOX') ? 'console-xbox' : 'console-ps';
                playedDiv.innerHTML += `
                    <div class="player-match">
                        <div class="opp-name">vs ${opp}<br><span class="match-meta">${myTeam} vs ${oppTeam} · ${r[1]} · <span class="console-tag ${consoleClass}">${r[8]}</span></span></div>
                        <div class="match-score ${resultClass}">${myScore} - ${oppScore}</div>
                        <div style="font-weight:900; font-size:0.8em; color:${resultClass === 'win' ? 'var(--bye)' : resultClass === 'loss' ? 'var(--danger)' : 'var(--gold)'}">${resultLabel}</div>
                    </div>`;
            });
            document.getElementById('playedCount').textContent = `(${played.length})`;
            statsDiv.innerHTML = `<span style="color:var(--bye)">${wins}W</span> · <span style="color:var(--gold)">${draws}D</span> · <span style="color:var(--danger)">${losses}L</span> · ${wins * 3 + draws} pts`;
        } else {
            playedDiv.innerHTML = '<div class="no-matches">No matches played yet</div>';
        }

        // ─── REMAINING MATCHES ───
        // Get group mates from leaderboard
        const lb = (globalData.leaderboard || []).slice(1);
        const playerRow = lb.find(r => r[1] === name);
        const group = playerRow ? playerRow[2] : null;

        if (group) {
            const groupMates = lb.filter(r => r[2] === group && r[1] !== name).map(r => r[1]);
            const remaining = groupMates.filter(opp => !playedOpponents.has(opp));

            if (remaining.length) {
                remaining.forEach(opp => {
                    remainDiv.innerHTML += `
                        <div class="remaining-match">
                            <div class="opp-name">vs ${opp}</div>
                            <div class="pending-tag">⏳ Pending</div>
                        </div>`;
                });
            } else {
                remainDiv.innerHTML = '<div class="no-matches">All group matches completed! 🎉</div>';
            }
            document.getElementById('remainingCount').textContent = `(${remaining.length})`;
        }

        // ─── TEAM ROSTER ───
        let availCount = 0, usedCount = 0;
        player.teams.forEach(team => {
            if(!team) return;
            const usage = (globalData.usageMap && globalData.usageMap[name] && globalData.usageMap[name][team]) || 0;
            const isMaxed = usage >= 1;
            if (isMaxed) usedCount++; else availCount++;
            list.innerHTML += `
                <div class="team-row ${isMaxed ? 'maxed' : ''}">
                    <div><span style="font-weight:bold">${team}</span><br><div class="dot ${isMaxed ? 'used' : ''}"></div></div>
                    <div style="font-size:0.7em; font-weight:bold; color:${isMaxed?'var(--danger)':'#555'}">${isMaxed?'UNAVAILABLE':'AVAILABLE'}</div>
                </div>`;
        });
        const totalTeams = player.teams.filter(t => t).length;
        document.getElementById('rosterCount').textContent = `(${totalTeams - played.length} available / ${totalTeams})`;
    }

    function renderPlayoffs() {
        const lb = (globalData.leaderboard || []).slice(1);
        const grpA = lb.filter(r => r[2] === 'A');
        const grpB = lb.filter(r => r[2] === 'B');
        const container = document.getElementById('playoffBracket');

        const A1 = grpA[0] ? grpA[0][1] : null;
        const A2 = grpA[1] ? grpA[1][1] : null;
        const A3 = grpA[2] ? grpA[2][1] : null;
        const B1 = grpB[0] ? grpB[0][1] : null;
        const B2 = grpB[1] ? grpB[1][1] : null;
        const B3 = grpB[2] ? grpB[2][1] : null;

        if (!A1 && !B1) {
            container.innerHTML = '<div class="no-matches">Leaderboard data not available yet</div>';
            return;
        }

        const poData = (globalData.playoffs || []).slice(1).filter(r => r[0]);
        const getGame = (prefix, gameNum) => poData.find(r => r[0] === `${prefix}-G${gameNum}`);

        function seriesResult(prefix, p1, p2) {
            let w1 = 0, w2 = 0, games = [];
            for (let g = 1; g <= 3; g++) {
                const m = getGame(prefix, g);
                if (m) {
                    const s1 = Number(m[6]), s2 = Number(m[7]);
                    games.push({ s1, s2, console: m[8], p1Team: m[4], p2Team: m[5] });
                    if (s1 > s2) w1++;
                    else if (s2 > s1) w2++;
                } else { games.push(null); }
            }
            return { w1, w2, games, winner: w1 >= 2 ? p1 : (w2 >= 2 ? p2 : null) };
        }

        const qf1 = seriesResult('QF1', A2, B3);
        const qf2 = seriesResult('QF2', A3, B2);
        const sf2p2 = qf1.winner, sf1p2 = qf2.winner;
        const sf1 = sf1p2 ? seriesResult('SF1', A1, sf1p2) : { w1:0, w2:0, games:[null,null,null], winner:null };
        const sf2 = sf2p2 ? seriesResult('SF2', B1, sf2p2) : { w1:0, w2:0, games:[null,null,null], winner:null };
        const fp1 = sf1.winner, fp2 = sf2.winner;
        const fin = (fp1 && fp2) ? seriesResult('F', fp1, fp2) : { w1:0, w2:0, games:[null,null,null], winner:null };

        function card(label, p1, p2, seed1, seed2, series, homePlayer, extra) {
            const tbd1 = !p1 || p1.includes('Winner'), tbd2 = !p2 || p2.includes('Winner');
            const decided = series.winner !== null;
            const p1Cls = decided ? (series.winner === p1 ? 'winner' : 'loser') : '';
            const p2Cls = decided ? (series.winner === p2 ? 'winner' : 'loser') : '';
            const isTbd = tbd1 || tbd2;
            const isF = extra === 'final';
            let gHtml = series.games.map((gm, i) => {
                const isHome = homePlayer && (i === 0 || i === 2);
                const lbl = `G${i+1}${isHome ? ' 🏠' : ''}`;
                if (gm) return `<div class="b-g ${isHome?'home':''}"><div class="b-gl">${lbl}</div><div class="b-gs played">${gm.s1}-${gm.s2}</div></div>`;
                if (decided) return `<div class="b-g" style="opacity:0.2"><div class="b-gl">${lbl}</div><div class="b-gs">—</div></div>`;
                return `<div class="b-g ${isHome?'home':''}"><div class="b-gl">${lbl}</div><div class="b-gs">—:—</div></div>`;
            }).join('');
            return `<div class="b-card ${decided ? 'decided' : ''} ${isTbd ? 'tbd' : ''} ${isF ? 'final-card' : ''}">
                <div class="b-label"><span>${label}</span>${homePlayer ? `<span class="b-home">🏠</span>` : ''}<span class="b-series" style="color:${decided?'var(--bye)':'var(--gold)'}">${series.w1}-${series.w2}</span></div>
                <div class="b-players">
                    <div class="b-p ${p1Cls}"><div class="b-name">${p1 || 'TBD'}</div><div class="b-seed">${seed1}</div></div>
                    <div class="b-vs">VS</div>
                    <div class="b-p ${p2Cls}"><div class="b-name">${p2 || 'TBD'}</div><div class="b-seed">${seed2}</div></div>
                </div>
                <div class="b-games">${gHtml}</div>
                ${decided ? `<div class="b-winner">🏆 ${series.winner}</div>` : ''}
            </div>`;
        }

        function byeCard(player, seed) {
            return `<div class="b-card decided" style="text-align:center;padding:16px;">
                <div class="b-label"><span>BYE</span></div>
                <div class="b-p winner" style="margin:8px 0"><div class="b-name" style="font-size:1em">${player || 'TBD'}</div><div class="b-seed">${seed}</div></div>
                <div class="b-winner">Auto-qualifies to SF</div>
            </div>`;
        }

        const qf1Active = qf1.winner ? 'active' : '';
        const qf2Active = qf2.winner ? 'active' : '';
        const sf2Active = sf2.winner ? 'active' : '';
        const sf1Active = sf1.winner ? 'active' : '';

        container.innerHTML = `
            <div class="bracket-title">🏆 FIFA 2026 — Playoff Bracket</div>
            <div class="bracket-grid">
                <div class="g-qf1">${card('QF1', A2, B3, 'A2', 'B3', qf1, A2)}</div>
                <div class="g-bye-b1">${byeCard(B1, 'B1 · 1st')}</div>
                <div class="g-conn-l1"><div class="conn-r ${qf1Active}"></div></div>
                <div class="g-sf2">${card('SF2', B1, sf2p2 || 'QF1 Winner', 'B1', qf1.winner ? 'QF1 W' : '?', sf2, null)}</div>
                <div class="g-conn-l2"><div class="conn-h ${sf2Active}"></div></div>
                <div class="g-final">${card('FINAL', fp1 || 'SF1 Winner', fp2 || 'SF2 Winner', '', '', fin, null, 'final')}</div>
                <div class="g-conn-r2"><div class="conn-h ${sf1Active}"></div></div>
                <div class="g-sf1">${card('SF1', A1, sf1p2 || 'QF2 Winner', 'A1', qf2.winner ? 'QF2 W' : '?', sf1, null)}</div>
                <div class="g-conn-r1"><div class="conn-l ${qf2Active}"></div></div>
                <div class="g-qf2">${card('QF2', A3, B2, 'A3', 'B2', qf2, B2)}</div>
                <div class="g-bye-a1">${byeCard(A1, 'A1 · 1st')}</div>
            </div>`;

        // ─── TROPHY CEREMONY ───
        if (fin.winner && !ceremonyShown) {
            ceremonyShown = true;
            const loser = fin.winner === fp1 ? fp2 : fp1;
            let totalGamesWon = 0, totalSeriesWon = 0;
            const countWins = (s, p1) => {
                let w = 0;
                s.games.forEach(g => {
                    if (!g) return;
                    const champIsP1 = fin.winner === p1;
                    if (champIsP1 && g.s1 > g.s2) w++;
                    else if (!champIsP1 && g.s2 > g.s1) w++;
                });
                return w;
            };
            [[qf1,A2],[qf2,A3],[sf1,A1],[sf2,B1],[fin,fp1]].forEach(([s, p1]) => {
                if (s.winner === fin.winner) {
                    totalSeriesWon++;
                    totalGamesWon += countWins(s, p1);
                }
            });

            document.getElementById('champName').textContent = fin.winner;
            document.getElementById('champW').textContent = totalSeriesWon;
            document.getElementById('champG').textContent = totalGamesWon;
            document.getElementById('champRunner').textContent = `🥈 Runner-up: ${loser}`;
            setTimeout(() => {
                document.getElementById('trophyCeremony').classList.add('show');
                fireConfetti();
            }, 500);
        }
    }

    function fireConfetti() {
        const duration = 6000;
        const end = Date.now() + duration;
        const colors = ['#ffc107', '#00d4ff', '#28a745', '#ff4444', '#ffffff'];
        (function frame() {
            confetti({ particleCount: 4, angle: 60, spread: 70, origin: { x: 0, y: 0.7 }, colors });
            confetti({ particleCount: 4, angle: 120, spread: 70, origin: { x: 1, y: 0.7 }, colors });
            if (Date.now() < end) requestAnimationFrame(frame);
        })();
    }

    function closeCeremony() {
        document.getElementById('trophyCeremony').classList.remove('show');
    }
</script>
</body>
</html>
